# DotaHelperAgent LLM 配置文件
# 复制此文件为 llm_config.yaml 并根据需要修改配置

llm:
  # 是否启用 LLM
  enabled: true
  
  # API 基础 URL
  # DeepSeek API: https://api.deepseek.com
  # 本地部署选项：
  # - LM Studio: http://127.0.0.1:1234/v1
  # - Ollama: http://127.0.0.1:11434/v1
  # - vLLM: http://127.0.0.1:8000/v1
  base_url: "https://api.deepseek.com"
  
  # 模型名称
  # DeepSeek 模型: deepseek-v4-pro
  # 其他选项: deepseek-chat, deepseek-coder
  model: "deepseek-v4-pro"
  
  # API Key（从环境变量读取，不要在此处配置）
  # 设置环境变量: DEEPSEEK_API_KEY 或 LLM_API_KEY
  api_key: null
  
  # 生成参数
  temperature: 0.7
  max_tokens: 2048
  top_p: 0.9
  
  # 超时时间（秒）
  timeout: 120
  
  # 是否启用流式输出
  stream: false