<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DotaHelperAgent - Dota 2 助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .main-layout {
            display: flex;
            height: 100vh;
        }

        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            min-width: 0;
        }

        .container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(90deg, #e94560 0%, #ff6b6b 100%);
            padding: 16px 20px;
            text-align: center;
            border-radius: 16px 16px 0 0;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            color: rgba(255,255,255,0.8);
            font-size: 12px;
            margin-top: 4px;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: rgba(255, 255, 255, 0.03);
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 4px;
        }

        .message .meta {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 6px;
        }

        .message .content {
            font-size: 14px;
        }

        .thinking-steps {
            margin-bottom: 12px;
            border-left: 2px solid rgba(233, 69, 96, 0.3);
            padding-left: 12px;
        }

        .thinking-step {
            margin-bottom: 8px;
            animation: stepFadeIn 0.3s ease;
        }

        @keyframes stepFadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .thinking-step-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: rgba(233, 69, 96, 0.1);
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        .thinking-step-header:hover {
            background: rgba(233, 69, 96, 0.2);
        }

        .thinking-step-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .thinking-step-title {
            flex: 1;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        .thinking-step-toggle {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            transition: transform 0.2s;
        }

        .thinking-step.collapsed .thinking-step-toggle {
            transform: rotate(-90deg);
        }

        .thinking-step-content {
            padding: 8px 10px;
            font-size: 12px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8);
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            margin-top: 4px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .thinking-step.collapsed .thinking-step-content {
            display: none;
        }

        .thinking-step.thinking .thinking-step-icon {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .thinking-step.thinking .thinking-step-title {
            color: #ffe66d;
        }

        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 8px 12px;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        .answer-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(233, 69, 96, 0.5), transparent);
            margin: 12px 0;
        }

        .input-area {
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0 0 16px 16px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .query-input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .query-input:focus {
            border-color: #e94560;
        }

        .query-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(233, 69, 96, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status-bar {
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.1);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00b894;
        }

        .status-dot.streaming {
            background: #ffe66d;
            animation: pulse 1s infinite;
        }

        .trace-id {
            margin-left: auto;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            font-family: 'Courier New', monospace;
            background: rgba(0, 0, 0, 0.2);
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .trace-id:hover {
            color: rgba(255, 255, 255, 0.7);
            background: rgba(0, 0, 0, 0.3);
        }

        .trace-id:empty {
            display: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state p {
            font-size: 14px;
            line-height: 1.6;
        }

        .hint {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            text-align: center;
            padding: 8px;
        }

        /* 日志侧边栏样式 */
        .log-sidebar {
            width: 450px;
            background: rgba(0, 0, 0, 0.3);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            transition: width 0.3s;
        }

        .log-sidebar.collapsed {
            width: 0;
            overflow: hidden;
        }

        .log-header {
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .log-header h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: #fff;
        }

        .log-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .tab-btn {
            padding: 4px 12px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
        }

        .log-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .log-controls select,
        .log-controls button {
            padding: 4px 8px;
            font-size: 11px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
        }

        .log-panel {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }

        .log-panel.active {
            display: flex;
        }

        .log-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 11px;
        }

        .log-entry {
            padding: 6px 8px;
            margin-bottom: 4px;
            border-radius: 4px;
            border-left: 3px solid;
            background: rgba(255, 255, 255, 0.05);
            animation: logFadeIn 0.2s ease;
        }

        @keyframes logFadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .log-entry:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* 日志等级颜色 */
        .log-entry.DEBUG { border-left-color: #6c757d; }
        .log-entry.INFO { border-left-color: #17a2b8; }
        .log-entry.WARNING { border-left-color: #ffc107; }
        .log-entry.ERROR { border-left-color: #dc3545; }

        .log-entry .log-header-line {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-bottom: 2px;
        }

        .log-entry .timestamp {
            color: #888;
            font-size: 10px;
        }

        .log-entry .level-badge {
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: bold;
        }

        .log-entry .level-badge.DEBUG { background: #6c757d; }
        .log-entry .level-badge.INFO { background: #17a2b8; }
        .log-entry .level-badge.WARNING { background: #ffc107; color: #000; }
        .log-entry .level-badge.ERROR { background: #dc3545; }

        .log-entry .component-tag {
            color: #9b59b6;
            font-size: 10px;
        }

        .log-entry .logger-name {
            color: #888;
            font-size: 10px;
        }

        .log-entry .log-message {
            color: #fff;
            word-break: break-all;
            line-height: 1.4;
        }

        .log-entry .log-extra-btn {
            color: #3498db;
            font-size: 10px;
            cursor: pointer;
            margin-top: 4px;
        }

        .log-entry .log-extra-content {
            background: rgba(0, 0, 0, 0.3);
            padding: 6px;
            margin-top: 4px;
            border-radius: 4px;
            font-size: 10px;
            color: #aaa;
            white-space: pre-wrap;
            overflow-x: auto;
        }

        /* 文件列表面板 */
        .file-list {
            max-height: 150px;
            overflow-y: auto;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .file-item {
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .file-item .file-name {
            font-size: 12px;
            color: #fff;
        }

        .file-item .file-size {
            font-size: 10px;
            color: #888;
        }

        .file-content {
            flex: 1;
            overflow: auto;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
        }

        .file-content pre {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 11px;
            color: #ccc;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* 侧边栏切换按钮 */
        .sidebar-toggle {
            position: fixed;
            right: 20px;
            bottom: 100px;
            padding: 10px 16px;
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            border: none;
            border-radius: 24px;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(233, 69, 96, 0.4);
            z-index: 100;
        }

        /* 英雄选择器侧边栏 */
        .hero-sidebar {
            width: 350px;
            background: rgba(0, 0, 0, 0.3);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .hero-sidebar-header {
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hero-sidebar-header h3 {
            margin: 0;
            font-size: 14px;
            color: #fff;
        }

        .hero-close-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
        }

        .generate-section {
            padding: 20px 16px;
            text-align: center;
        }

        .generate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .generate-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(233, 69, 96, 0.4);
        }

        .generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .hint-text {
            font-size: 12px;
            color: #888;
            margin-top: 8px;
            margin-bottom: 0;
        }

        .result-section {
            padding: 12px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .result-header span {
            font-size: 13px;
            color: #fff;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 4px;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .result-content {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
            color: #fff;
            word-break: break-all;
            min-height: 60px;
        }

        .history-section {
            padding: 12px 16px;
            flex: 1;
            overflow-y: auto;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .section-header span {
            font-size: 13px;
            color: #fff;
        }

        .clear-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 12px;
        }

        .clear-btn:hover {
            color: #fff;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .history-item .time {
            font-size: 10px;
            color: #888;
            margin-bottom: 4px;
        }

        .history-item .content {
            font-size: 12px;
            color: #ccc;
            line-height: 1.4;
        }

        /* 英雄选择器切换按钮 */
        .hero-sidebar-toggle {
            position: fixed;
            right: 20px;
            bottom: 150px;
            padding: 10px 16px;
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            border: none;
            border-radius: 24px;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 184, 148, 0.4);
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="main-layout">
        <!-- 聊天区域 -->
        <div class="chat-section">
            <div class="container">
                <div class="header">
                    <h1>🎮 DotaHelperAgent</h1>
                    <p>您的 Dota 2 智能助手</p>
                </div>

                <div class="chat-area" id="chatArea">
                    <div class="empty-state" id="emptyState">
                        <div class="icon">💬</div>
                        <p>开始对话吧！<br>试试输入：推荐克制英雄（敌方：pudge, am）</p>
                    </div>
                </div>

                <div class="hint">支持格式：敌方：英雄1,英雄2 | 己方：英雄1,英雄2</div>

                <div class="input-area">
                    <input type="text" class="query-input" id="queryInput" placeholder="输入您的问题，如：推荐克制敌方英雄">
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
                </div>

                <div class="status-bar">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">就绪</span>
                    <span class="trace-id" id="traceIdDisplay" title="点击复制 Trace ID"></span>
                </div>
            </div>
        </div>

        <!-- 日志侧边栏 -->
        <div class="log-sidebar" id="logSidebar">
            <div class="log-header">
                <h3>📋 运行日志</h3>
                <div class="log-tabs">
                    <button class="tab-btn active" onclick="switchTab('live')">实时</button>
                    <button class="tab-btn" onclick="switchTab('files')">文件</button>
                </div>
                <div class="log-controls">
                    <select id="logFilter" onchange="filterLogs()">
                        <option value="all">全部</option>
                        <option value="DEBUG">Debug</option>
                        <option value="INFO">Info</option>
                        <option value="WARNING">Warning</option>
                        <option value="ERROR">Error</option>
                    </select>
                    <select id="componentFilter" onchange="filterLogs()">
                        <option value="all">所有组件</option>
                        <option value="agent">Agent</option>
                        <option value="tool">Tool</option>
                        <option value="cache">Cache</option>
                        <option value="api">API</option>
                        <option value="web">Web</option>
                    </select>
                    <button onclick="clearLogs()" title="清空">🗑️</button>
                    <button onclick="exportLogs()" title="导出">📥</button>
                    <button onclick="toggleSidebar()" title="收起">✕</button>
                </div>
            </div>

            <!-- 实时日志面板 -->
            <div class="log-panel active" id="livePanel">
                <div class="log-content" id="logContent"></div>
            </div>

            <!-- 日志文件面板 -->
            <div class="log-panel" id="filesPanel">
                <div class="file-list" id="fileList"></div>
                <div class="file-content" id="fileContent">
                    <p style="color: #888; text-align: center; padding: 40px;">点击左侧文件查看内容</p>
                </div>
            </div>
        </div>

        <!-- 英雄选择器侧边栏 -->
        <div class="hero-sidebar" id="heroSidebar" style="display: none;">
            <div class="hero-sidebar-header">
                <h3>🎮 英雄选择器</h3>
                <button onclick="toggleHeroSidebar()" class="hero-close-btn">✕</button>
            </div>

            <!-- 生成按钮 -->
            <div class="generate-section">
                <button onclick="generateHeroQuery()" class="generate-btn" id="generateBtn">
                    ✨ 一键生成英雄推荐查询
                </button>
                <p class="hint-text">随机生成我方和敌方英雄，自动生成查询文本</p>
            </div>

            <!-- 生成结果区 -->
            <div class="result-section" id="resultSection" style="display: none;">
                <div class="result-header">
                    <span>生成结果</span>
                    <button onclick="copyResult()" class="copy-btn" id="copyBtn">📋 复制</button>
                </div>
                <div class="result-content" id="resultContent"></div>
            </div>

            <!-- 历史记录区 -->
            <div class="history-section">
                <div class="section-header">
                    <span>历史记录</span>
                    <button onclick="clearHistory()" class="clear-btn">🗑️ 清空</button>
                </div>
                <div class="history-list" id="historyList"></div>
            </div>
        </div>
    </div>

    <!-- 侧边栏切换按钮 -->
    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">
        📋 日志
    </button>

    <!-- 英雄选择器切换按钮 -->
    <button class="hero-sidebar-toggle" id="heroSidebarToggle" onclick="toggleHeroSidebar()">
        🎮 英雄
    </button>

    <script>
        let isStreaming = false;
        let sessionId = generateSessionId();
        let currentTraceId = null;  // 当前请求的 Trace ID
        let logEventSource = null;
        let currentFilter = { level: 'all', component: 'all' };
        let activeTab = 'live';

        function generateSessionId() {
            return 'sess_' + Math.random().toString(36).substr(2, 9);
        }

        function generateTraceId() {
            // 生成 UUID v4 格式的 Trace ID
            return 'trace_' + crypto.randomUUID().replace(/-/g, '').substring(0, 16);
        }

        function parseHeroesFromQuery(query) {
            const context = {
                our_heroes: [],
                enemy_heroes: []
            };

            const enemyPatterns = [
                /敌方[：:]\s*([^，,。\n]+)/gi,
                /enemy[：:]\s*([^，,。\n]+)/gi,
                /敌方英雄[：:]\s*([^，,。\n]+)/gi
            ];

            const ourPatterns = [
                /己方[：:]\s*([^，,。\n]+)/gi,
                /our[：:]\s*([^，,。\n]+)/gi,
                /己方英雄[：:]\s*([^，,。\n]+)/gi
            ];

            for (const pattern of enemyPatterns) {
                let match;
                while ((match = pattern.exec(query)) !== null) {
                    const heroes = match[1].split(/[,，]/).map(h => h.trim()).filter(h => h);
                    context.enemy_heroes.push(...heroes);
                }
            }

            for (const pattern of ourPatterns) {
                let match;
                while ((match = pattern.exec(query)) !== null) {
                    const heroes = match[1].split(/[,，]/).map(h => h.trim()).filter(h => h);
                    context.our_heroes.push(...heroes);
                }
            }

            context.our_heroes = [...new Set(context.our_heroes)];
            context.enemy_heroes = [...new Set(context.enemy_heroes)];

            return context;
        }

            const empty = document.getElementById('emptyState');
            if (empty) empty.remove();

            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.innerHTML = `
                ${meta ? `<div class="meta">${meta}</div>` : ''}
                <div class="content">${content.replace(/\n/g, '<br>')}</div>
            `;
            chatArea.appendChild(msg);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

                'goal_decomposition': '🎯',

        function addAnswerContent(msgElement, answer) {
            const content = msgElement.querySelector('.content');

            const answerDiv = document.createElement('div');
            answerDiv.className = 'final-answer';
            answerDiv.style.marginTop = '12px';

        async function sendMessageStream() {
            const query = queryInput.value.trim();
            if (!query) return;

            if (isStreaming) return;

            isStreaming = true;
            updateStatus('思考中...', true);
            sendBtn.disabled = true;
            addMessage('user', query, new Date().toLocaleTimeString());
            queryInput.value = '';

            // 生成新的 Trace ID 用于本次请求
            currentTraceId = generateTraceId();
            traceIdDisplay.textContent = `Trace: ${currentTraceId}`;
            console.log(`[Trace] Request started: ${currentTraceId}`);

            const msgElement = createStreamingMessage();
            const context = parseHeroesFromQuery(query);

            try {
                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Trace-ID': currentTraceId,
                        'X-Session-ID': sessionId
                    },
                    body: JSON.stringify({
                        query: query,
                        session_id: sessionId,
                        trace_id: currentTraceId,
                        context: context
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('event:')) {
                            const eventType = line.slice(6).trim();
                        } else if (line.startsWith('data:')) {
                            const dataStr = line.slice(5).trim();
                            try {
                                const data = JSON.parse(dataStr);
                                handleStreamEvent(msgElement, data);
                            } catch (e) {
                                console.error('Failed to parse SSE data:', e);
                            }
                        }
                    }
                }

            } catch (error) {
                console.error('Stream error:', error);
                removeTypingIndicator(msgElement);
                addAnswerContent(msgElement, `❌ 错误: ${error.message}`);
            } finally {
                isStreaming = false;
                updateStatus('就绪');
                sendBtn.disabled = false;
                queryInput.focus();
                
                // 记录 Trace ID 到控制台，方便调试
                if (currentTraceId) {
                    console.log(`[Trace] Request completed: ${currentTraceId}`);
                    console.log(`[Trace] View logs: /api/trace/${currentTraceId}`);
                }
            }
        }

        function handleStreamEvent(msgElement, data) {
            const eventType = data.step || 'unknown';
            
            switch (eventType) {
                case 'think':
                    addThinkingStep(msgElement, 'think', data.content || '分析用户查询...');
                    break;
                    
                case 'plan':
                    addThinkingStep(msgElement, 'plan', 
                        Array.isArray(data.actions) ? 
                        data.actions.map(a => `• ${a.tool || a.purpose}`).join('\n') : 
                        '制定执行计划...');
                    break;
                    
                case 'action':
                    const toolName = data.tool || data.tool_name || '未知工具';
                    const status = data.status || '执行中';
                    addThinkingStep(msgElement, 'action', 
                        `工具: ${toolName}\n状态: ${status}`);
                    break;
                    
                case 'observation':
                    const result = data.result;
                    addThinkingStep(msgElement, 'observation', 
                        typeof result === 'string' ? result : String(result));
                    break;
                    
                case 'reflect':
                    addThinkingStep(msgElement, 'reflect', data.content || '反思中...');
                    break;
                    
                case 'goal_decomposition':
                    addThinkingStep(msgElement, 'goal_decomposition', data.status || '开始目标分解...');
                    break;
                    
                case 'goal_decomposition_result':
                    const mainGoal = data.main_goal || '未知';
                    const subGoals = data.sub_goals || [];
                    const subGoalsText = subGoals.map(sg => 
                        `• [${sg.id}] ${sg.description} (工具: ${sg.tool_name || '无'})`
                    ).join('\n');
                    addThinkingStep(msgElement, 'goal_decomposition_result', 
                        `主目标: ${mainGoal}\n\n子目标:\n${subGoalsText}`);
                    break;
                    
                case 'goal_execution':
                    addThinkingStep(msgElement, 'goal_execution', data.status || '开始执行子目标...');
                    break;
                    
                case 'sub_goal_start':
                    addThinkingStep(msgElement, 'sub_goal_start', 
                        `子目标: ${data.description || data.sub_goal_id}\n工具: ${data.tool_name || '无'}`);
                    break;
                    
                case 'sub_goal_complete':
                    addThinkingStep(msgElement, 'sub_goal_complete', 
                        `子目标 ${data.sub_goal_id} 执行完成`);
                    break;
                    
                case 'sub_goal_failed':
                    addThinkingStep(msgElement, 'sub_goal_failed', 
                        `子目标 ${data.sub_goal_id} 执行失败\n错误: ${data.error || '未知'}`);
                    break;
                    
                case 'merge_results':
                    addThinkingStep(msgElement, 'merge_results', data.status || '合并子目标结果...');
                    break;
                    
                case 'synthesize':
                    removeTypingIndicator(msgElement);
                    const answer = data.answer || data.content;
                    console.log('[FRONTEND_TRACE] synthesize event received:', {
                        answerType: typeof answer,
                        answerPreview: typeof answer === 'string' ? answer.substring(0, 200) : JSON.stringify(answer).substring(0, 200),
                        isString: typeof answer === 'string',
                        dataKeys: Object.keys(data)
                    });
                    if (answer) {
                        const contentToAdd = typeof answer === 'string' ? answer : JSON.stringify(answer, null, 2);
                        console.log('[FRONTEND_TRACE] Content to add:', contentToAdd.substring(0, 300));
                        addAnswerContent(msgElement, contentToAdd);
                    }
                    break;
                    
                case 'complete':
                    removeTypingIndicator(msgElement);
                    const totalTime = data.total_time || 0;
                    const turns = data.turns || 0;
                    updateStatus(`完成 (耗时: ${totalTime}s, 轮次: ${turns})`);
                    break;
                    
                case 'error':
                    removeTypingIndicator(msgElement);
                    addAnswerContent(msgElement, `❌ 错误: ${data.error || '未知错误'}`);
                    break;
            }
        }

        // === 日志功能 ===

        function initLogStream() {
            // 连接 SSE 日志流
            logEventSource = new EventSource(`/api/logs/stream?session_id=${sessionId}`);

            logEventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type !== 'heartbeat') {
                    addLogEntry(data);
                }
            };

            logEventSource.onerror = (error) => {
                console.error('Log stream error:', error);
                setTimeout(initLogStream, 3000); // 3秒后重连
            };
        }

        function addLogEntry(log) {
            // 过滤
            if (currentFilter.level !== 'all' && log.level !== currentFilter.level) return;
            if (currentFilter.component !== 'all' && log.component !== currentFilter.component) return;

            const container = document.getElementById('logContent');
            const entry = document.createElement('div');
            entry.className = `log-entry ${log.level}`;

            const time = new Date(log.timestamp).toLocaleTimeString();
            const extraInfo = log.extra_data ? '📎' : '';

            entry.innerHTML = `
                <div class="log-header-line">
                    <span class="timestamp">${time}</span>
                    <span class="level-badge ${log.level}">${log.level}</span>
                    <span class="component-tag">${log.component}</span>
                    <span class="logger-name">${log.logger}</span>
                    ${extraInfo}
                </div>
                <div class="log-message">${escapeHtml(log.message)}</div>
                ${log.extra_data ? `<div class="log-extra-btn" onclick="toggleExtra(this)">📋 详情</div>` : ''}
            `;

            // 保存 extra_data 到 DOM
            if (log.extra_data) {
                entry.dataset.extra = JSON.stringify(log.extra_data, null, 2);
            }

            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;

            // 限制条目数
            while (container.children.length > 500) {
                container.removeChild(container.firstChild);
            }
        }

        function toggleExtra(element) {
            const entry = element.parentElement;
            const extra = entry.querySelector('.log-extra-content');

            if (extra) {
                extra.remove();
                element.textContent = '📋 详情';
            } else {
                const data = entry.dataset.extra;
                const pre = document.createElement('pre');
                pre.className = 'log-extra-content';
                pre.textContent = data;
                entry.appendChild(pre);
                element.textContent = '📖 收起';
            }
        }

            try {
                const response = await fetch('/api/logs/files');

                list.innerHTML = data.files.map(f => `

            }

        async function loadFileContent(filename) {
            try {
                const response = await fetch(`/api/logs/files/${filename}?tail=100`);
                const data = await response.json();

                document.getElementById('fileContent').innerHTML = `
                    <div style="margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <strong>${filename}</strong>
                        <button onclick="loadFileContent('${filename}')" style="margin-left: 10px; padding: 2px 8px; font-size: 11px;">刷新</button>
                    </div>
                    <pre>${escapeHtml(data.content)}</pre>
                `;
            } catch (error) {
                console.error('Failed to load file content:', error);
            }

        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function switchTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.log-panel').forEach(p => p.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tab + 'Panel').classList.add('active');

            if (tab === 'files') {
                loadLogFiles();
            }

        async function loadHistoryLogs() {
            try {
                const params = new URLSearchParams({
                    session_id: sessionId,
                    limit: '100'
                });
                if (currentFilter.level !== 'all') params.append('level', currentFilter.level);
                if (currentFilter.component !== 'all') params.append('component', currentFilter.component);

                const response = await fetch(`/api/logs?${params}`);
                const data = await response.json();

                const container = document.getElementById('logContent');
                container.innerHTML = '';
                data.logs.forEach(log => addLogEntry(log));

                await fetch('/api/logs/clear', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId })
                });

        async function exportLogs() {
            try {
                const params = new URLSearchParams({
                    session_id: sessionId,
                    limit: '1000'
                });
                const response = await fetch(`/api/logs?${params}`);
                const data = await response.json();

                const blob = new Blob([JSON.stringify(data.logs, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `logs_${sessionId}_${Date.now()}.json`;
                a.click();
                URL.revokeObjectURL(url);

                console.error('Failed to export logs:', error);
            }

        // === 英雄选择器功能 ===
        let heroHistory = [];
        let heroSidebarVisible = false;

        // 生成英雄查询文本
        async function generateHeroQuery() {
            const btn = document.getElementById('generateBtn');
            const resultSection = document.getElementById('resultSection');
            const resultContent = document.getElementById('resultContent');
            
            // 禁用按钮，显示加载状态
            btn.disabled = true;
            btn.textContent = '⏳ 生成中...';
            
            try {
                const response = await fetch('/api/generate_hero_query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // 显示结果
                    resultContent.textContent = data.query;
                    resultSection.style.display = 'block';
                    
                    // 保存到历史记录
                    saveToHistory(data.query);
                } else {
                    alert('生成失败：' + (data.error || '未知错误'));
                }
            } catch (error) {
                console.error('Failed to generate query:', error);
                alert('生成失败：' + error.message);
            } finally {
                // 恢复按钮状态
                btn.disabled = false;
                btn.textContent = '✨ 一键生成英雄推荐查询';

        // 复制结果
        function copyResult() {
            const content = document.getElementById('resultContent').textContent;
            navigator.clipboard.writeText(content).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = '✅ 已复制';
                setTimeout(() => {
                    btn.textContent = '📋 复制';
                }, 2000);
            }).catch(err => {
                console.error('复制失败:', err);
                alert('复制失败');
            });
        }

        // 保存到历史记录
        function saveToHistory(query) {
            const record = {
                id: Date.now(),
                time: new Date().toLocaleString(),
                query: query
            };
            
            heroHistory.unshift(record);
            
            // 最多保留50条
            if (heroHistory.length > 50) {
                heroHistory = heroHistory.slice(0, 50);
            }
            
            // 保存到 localStorage
            localStorage.setItem('heroGenHistory', JSON.stringify(heroHistory));
            
            renderHistory();
        }

        // 加载历史记录
        function loadHistory() {
            const saved = localStorage.getItem('heroGenHistory');
            if (saved) {
                try {
                    heroHistory = JSON.parse(saved);
                    renderHistory();
                } catch (e) {
                    heroHistory = [];
                }
            }
        }

        // 渲染历史记录
        function renderHistory() {
            const container = document.getElementById('historyList');
            if (heroHistory.length === 0) {
                container.innerHTML = '<p style="color: #888; text-align: center; font-size: 12px;">暂无历史记录</p>';
                return;
            }
            
            container.innerHTML = heroHistory.map(item => `
                <div class="history-item" onclick="loadHistoryItem(${item.id})">
                    <div class="time">${item.time}</div>
                    <div class="content">${item.query}</div>
                </div>
            `).join('');
        }

        // 加载历史记录项
        function loadHistoryItem(id) {
            const item = heroHistory.find(h => h.id === id);
            if (!item) return;
            
            document.getElementById('resultContent').textContent = item.query;
            document.getElementById('resultSection').style.display = 'block';
        }

        // 清空历史记录
        function clearHistory() {
            if (confirm('确定要清空所有历史记录吗？')) {
                heroHistory = [];
                localStorage.removeItem('heroGenHistory');
                renderHistory();
            }
        }

        // 切换英雄侧边栏
        function toggleHeroSidebar() {
            const sidebar = document.getElementById('heroSidebar');
            const toggle = document.getElementById('heroSidebarToggle');
            heroSidebarVisible = !heroSidebarVisible;
            
            if (heroSidebarVisible) {
                sidebar.style.display = 'flex';
                toggle.style.display = 'none';
            } else {
                sidebar.style.display = 'none';
                toggle.style.display = 'block';
            }
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            initLogStream();
            loadHistoryLogs();
            loadHistory();
        });
    </script>
</body>
</html>
